<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta
http-equiv="X-UA-Compatible"
content="IE=edge"
>
<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
>
<link
rel="preconnect"
href="https://fonts.googleapis.com"
>
<link
rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin
>
<link
href="https://fonts.googleapis.com/css2?
family=Roboto:wght@400;700&display=swap"
rel="stylesheet"
>
<link
rel="stylesheet"
href="./style.css"
>
<title>Conversor Financeiro</title>
</head>
<body>
<div class="video-bg">
<video
src="moedas-caindo.mp4"
autoplay
muted
loop
></video>
<div class="mascara"></div>
</div>
<div class="topo">
<h1> Conversor Financeiro</h1>
<p class="subtitle">
 Conversão de moedas em tempo real
</p>
</div>
<main>
<label>
 Converter <b>de</b>
<select class="from-currency">
<option value="BRL">R$ Real Brasileiro</option>
<option value="USD">US$ Dólar Americano</option>
<option value="EUR">€ Euro</option>
<option value="GBP">£ Libra Esterlina</option>
<option value="JPY">¥ Iene Japonês</option>
<option value="BTC">₿ Bitcoin</option>
</select>
</label>
<label>
 Converter <b>para</b>
<select class="to-currency">
<option value="USD">US$ Dólar Americano</option>
<option value="EUR">€ Euro</option>
<option value="GBP">£ Libra Esterlina</option>
<option value="JPY">¥ Iene Japonês</option>
<option value="BTC">₿ Bitcoin</option>
<option value="BRL">R$ Real Brasileiro</option>
</select>
</label>
<button class="swap-button">
 ⇅
</button>
<label>
 Valor
<input
class="input-currency"
placeholder="R$ 10.000,00"
/>
</label>
<button class="convert-button">
 Converter
</button>
<section>
<div class="currency-box">
<img
class="from-currency-img"
src="./real.png"
alt="Moeda origem"
>
<p
class="currency"
id="from-currency-name"
>
 Real Brasileiro
</p>
<p class="currency-value-to-convert">
 R$ 0,00
</p>
</div>
<div class="arrow-icon">
 ↓
</div>
<div class="currency-box">
<img
class="to-currency-img"
src="./usa.png"
alt="Moeda destino"
>
<p
class="currency"
id="to-currency-name"
>
 Dólar Americano
</p>
<p class="currency-value">
 US$ 0,00
</p>
</div>
</section>
<p class="update-time">
 Cotação atualizada agora
</p>
<div class="history">
<h2>
 Histórico
</h2>
<ul class="history-list"></ul>
</div>
</main>
<script src="./scripts.js"></script>
</body>
</html>
